<div class="es-sidebar-item__root">
  <div class="es-sidebar-item__wrapper">
    <button
      mat-ripple
      class="es-sidebar-item__button"
      [ngClass]="{
        'es-sidebar-item__button_primary-color': color === 'primary'
      }">
      <div #sidebarItemButtonContainer class="es-sidebar-item__button__container">
        <mat-icon class="es-sidebar-item__button__container__icon" [svgIcon]="icon"></mat-icon>
        <span class="es-sidebar-item__button__container__text es-body-100"
        [ngStyle]="{display: isOpen ? 'block' : 'none'}"
        >{{ text }}</span>
      </div>
    </button>
    <button
      mat-icon-button
      *ngIf="isOpen"
      class="es-sidebar-item__button-secondary-action"
      [ngClass]="{
        'es-sidebar-item__button-secondary-action_primary-color': color === 'primary'
      }"
      [ngStyle]="{ 'pointer-events': behaviour === 'hover' ? 'none' : 'all', left: (width$ | async) + 'px' }">
      <mat-icon [svgIcon]="isNestedMenuOpen ? 'es-24:chevron-down-line-w200' : 'es-24:chevron-left-line-w200'"></mat-icon>
    </button>
  </div>
</div>
