<div class="es-sidebar-divider__root" [ngStyle]="{ padding: isOpen ? '0 16px' : '0 8px' }">
  <mat-divider
    class="es-sidebar-divider__line"
    [ngClass]="{
      'es-sidebar-divider__line_primary-color': color === 'primary',
      'es-sidebar-divider__line_secondary-color': color === 'secondary'
    }">
  </mat-divider>
</div>
